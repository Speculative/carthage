# /home/carthage/.tmux.conf — shipped in carthage-base.
#
# Conservative defaults. The status bar's job is to make it obvious you are
# inside a Carthage sandbox; everything else is QoL.

# --- Prefix ----------------------------------------------------------------
# Rebind to C-a; keep C-b as a secondary prefix so muscle memory survives.
unbind C-b
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix

# --- General ---------------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color. tmux-256color is the modern terminfo entry; the override line
# is the standard incantation for forwarding 24-bit color from xterm-likes.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- Pane navigation: prefix h/j/k/l ---------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits inherit the current pane's working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Window navigation: prefix Tab/Shift-Tab, plus n/p as aliases ----------
# n/p are tmux defaults; we re-bind them explicitly so the intent is visible.
bind Tab next-window
bind BTab previous-window
bind n next-window
bind p previous-window

# --- Status bar ------------------------------------------------------------
# Fallback chain: $CARTHAGE_PROJECT (set by compose) → "no-project".
# Color choice: yellow-on-dark to make it visually distinct from a normal
# host shell — the whole point of this status bar is "you are in a sandbox".
#
# Do NOT use `#(printf %s ...)` here: tmux expands %-codes in the template
# before evaluating #(...), and %s is epoch seconds. Use #{?VAR,...} for
# native env expansion instead.
#
# 15s interval matches /proc/loadavg's update granularity (the kernel's
# LOAD_FREQ is 5s, but the 1-min value is a 60s EMA so finer polling is
# wasted) without being twitchy enough to flash the screen.
set -g status-interval 15
set -g status-style "bg=colour236 fg=colour250"

set -g status-left-length 50
set -g status-left '#[bg=colour172,fg=colour16,bold] carthage:#{?CARTHAGE_PROJECT,#{CARTHAGE_PROJECT},no-project} #[default] '

# Right side: 1/5/15-min load averages + wall clock. Load average is a cheap,
# useful runtime signal inside a dev container (catches runaway builds/tests)
# and reads from /proc with no extra deps.
set -g status-right-length 60
set -g status-right '#[fg=colour245]#(cut -d" " -f1-3 /proc/loadavg) #[fg=colour240]│ #[fg=colour250]%H:%M #[default]'

set -g window-status-current-style "bg=colour240 fg=colour255 bold"
set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "

# --- Reload --------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
