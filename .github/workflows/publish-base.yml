name: Publish carthage-base to GHCR

# Triggered on semver tag push. Pushes three tags:
#   - the full version      (v1.2.3)
#   - the major             (v1)
#   - latest
# Multi-arch (amd64 + arm64) from day one.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manual tag to publish as (e.g. v1.2.3)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version tags
        id: tags
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            version="${{ github.event.inputs.tag }}"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi
          case "$version" in
            v*.*.*) ;;
            *) echo "::error::version '$version' is not vN.N.N"; exit 1;;
          esac
          major="${version%%.*}"          # v1.2.3 -> v1
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/carthage-base"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major"     >> "$GITHUB_OUTPUT"
          echo "image=$image"     >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 builds on amd64 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./base
          file: ./base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.major }}
            ${{ steps.tags.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
