name: carthage-e2e-py-http-server

x-carthage-labels: &carthage_labels
  carthage.managed: "true"
  carthage.project: "e2e-py-http-server"

services:
  dev:
    build:
      context: ..
      dockerfile: .carthage/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: carthage-e2e-py-http-server:latest
    working_dir: /workspace
    init: true
    tty: true
    stdin_open: true

    labels:
      <<: *carthage_labels
      carthage.role: "dev"

    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    pids_limit: 1000
    mem_limit: ${CARTHAGE_MEM_LIMIT:-0}
    cpus: ${CARTHAGE_CPUS:-0}

    environment:
      CARTHAGE: "1"
      CARTHAGE_PROJECT: "e2e-py-http-server"

    volumes:
      - ..:/workspace:rw
      - ${HOME}/.claude:/home/carthage/.claude:rw
      - ${HOME}/.claude.json:/home/carthage/.claude.json:rw
      - ${HOME}/.gitconfig:/home/carthage/.gitconfig:ro
      - ${HOME}/.carthage/state/e2e-py-http-server:/commandhistory:rw

    ports:
      - "18000:8000"        # E2E test A: host-side curl on localhost:18000

    networks:
      - carthage-net

networks:
  carthage-net:
    driver: bridge
